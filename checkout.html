<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <meta name="robots" content="noindex" />
  <title>Site Check-Out — BIK Business Toolkit</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --charcoal: #252320; --coral: #D85A30; --coral-dark: #b84a24;
      --paper: #F2EDE5; --border: #e2d9cc; --text: #252320;
      --muted: #666; --radius: 10px; --green: #2e7d32;
    }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--paper); color: var(--text); min-height: 100vh; -webkit-font-smoothing: antialiased; }
    .ci-header { background: var(--charcoal); padding: 16px 20px; display: flex; align-items: center; gap: 12px; }
    .ci-logo-mark { width:34px;height:34px;background:var(--coral);border-radius:7px;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:1.05rem;color:#fff;flex-shrink:0; }
    .ci-header-title { font-size:0.85rem;font-weight:700;color:#fff; }
    .ci-header-sub { font-size:0.72rem;color:rgba(255,255,255,0.5);margin-top:2px; }
    .screen { display:none; }
    .screen.active { display:block; }
    .co-form { padding:20px;max-width:480px;margin:0 auto; }
    .ci-step-label { font-size:0.62rem;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:var(--coral);margin-bottom:6px; }
    .ci-step-title { font-size:1.1rem;font-weight:800;color:var(--charcoal);margin-bottom:20px;line-height:1.2; }
    .worker-card { background:#fff;border:1.5px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:20px; }
    .wc-name { font-size:1.1rem;font-weight:800;color:var(--charcoal);margin-bottom:4px; }
    .wc-meta { font-size:0.8rem;color:var(--muted);display:flex;gap:12px;flex-wrap:wrap; }
    .wc-time { background:var(--paper);border-radius:6px;padding:12px;margin-top:12px;font-size:0.82rem;color:var(--muted); }
    .wc-time strong { color:var(--charcoal); }
    .time-display { text-align:center;background:#fff;border:1.5px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:16px; }
    .td-label { font-size:0.7rem;color:var(--muted);text-transform:uppercase;letter-spacing:0.1em;margin-bottom:4px; }
    .td-time { font-size:2rem;font-weight:800;color:var(--charcoal);letter-spacing:-0.02em;font-variant-numeric:tabular-nums; }
    .field { margin-bottom:16px; }
    .field label { display:block;font-size:0.78rem;font-weight:700;color:var(--charcoal);margin-bottom:6px; }
    .field textarea { width:100%;padding:14px 16px;border:1.5px solid var(--border);border-radius:var(--radius);font-size:0.95rem;font-family:inherit;background:#fff;color:var(--text);resize:vertical;min-height:80px;outline:none; }
    .field textarea:focus { border-color:var(--coral); }
    .btn-primary { width:100%;background:var(--coral);color:#fff;border:none;border-radius:var(--radius);padding:18px;font-size:1.05rem;font-weight:800;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:10px;transition:background 0.15s; }
    .btn-primary:hover { background:var(--coral-dark); }
    .btn-secondary { width:100%;background:transparent;color:var(--charcoal);border:1.5px solid var(--border);border-radius:var(--radius);padding:14px;font-size:0.9rem;font-weight:600;cursor:pointer;font-family:inherit;margin-top:10px; }
    /* Manual lookup */
    .lookup-form { padding:20px;max-width:480px;margin:0 auto; }
    .field input { width:100%;padding:14px 16px;border:1.5px solid var(--border);border-radius:var(--radius);font-size:1rem;font-family:inherit;background:#fff;color:var(--text);outline:none; }
    .field input:focus { border-color:var(--coral); }
    .ci-error { background:#fff5f5;border:1.5px solid #fbb;border-radius:var(--radius);padding:14px 16px;font-size:0.84rem;color:#c00;margin-bottom:16px;display:none; }
    /* Success */
    .success-screen { padding:40px 20px;max-width:480px;margin:0 auto;text-align:center; }
    .success-icon { width:72px;height:72px;background:var(--green);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 20px;font-size:2rem; }
    .success-name { font-size:1.4rem;font-weight:900;color:var(--charcoal);margin-bottom:6px; }
    .success-sub { font-size:0.88rem;color:var(--muted);margin-bottom:28px;line-height:1.5; }
    .hours-badge { background:var(--charcoal);color:#fff;border-radius:var(--radius);padding:20px;margin-bottom:20px; }
    .hb-label { font-size:0.7rem;letter-spacing:0.1em;text-transform:uppercase;color:rgba(255,255,255,0.5);margin-bottom:6px; }
    .hb-value { font-size:2.5rem;font-weight:900;color:#fff;font-variant-numeric:tabular-nums; }
    .hb-unit { font-size:0.9rem;color:rgba(255,255,255,0.5);margin-top:2px; }
  </style>
</head>
<body>

<header class="ci-header">
  <div class="ci-logo-mark">B</div>
  <div>
    <div class="ci-header-title">BIK Site Check-Out</div>
    <div class="ci-header-sub" id="co-header-time"></div>
  </div>
</header>

<!-- Loading -->
<div id="screen-loading" class="screen active" style="padding:60px 20px;text-align:center;color:#888;font-size:0.9rem;">Loading…</div>

<!-- Manual lookup (no id in URL) -->
<div id="screen-lookup" class="screen">
  <div class="lookup-form">
    <div class="ci-step-label">Check out</div>
    <div class="ci-step-title">Enter your name to check out</div>
    <div class="field">
      <label>Full name</label>
      <input type="text" id="lookup-name" placeholder="John Smith" autocomplete="name" />
    </div>
    <div class="field">
      <label>Project name (optional)</label>
      <input type="text" id="lookup-project" placeholder="Smith Residence" />
    </div>
    <div class="ci-error" id="lookup-error"></div>
    <button class="btn-primary" id="btn-lookup">
      Find my check-in →
    </button>
  </div>
</div>

<!-- Confirm check-out -->
<div id="screen-checkout" class="screen">
  <div class="co-form">
    <div class="ci-step-label">Check out</div>
    <div class="ci-step-title">Confirm your departure</div>

    <div class="worker-card">
      <div class="wc-name" id="co-name"></div>
      <div class="wc-meta">
        <span id="co-company"></span>
        <span id="co-trade"></span>
      </div>
      <div class="wc-time">
        Checked in at <strong id="co-timein"></strong> on <strong id="co-project"></strong>
      </div>
    </div>

    <div class="time-display">
      <div class="td-label">Time Out</div>
      <div class="td-time" id="live-time">--:--</div>
    </div>

    <div class="field">
      <label>Notes <span style="font-size:0.72rem;font-weight:400;color:#888;">(optional)</span></label>
      <textarea id="co-notes" placeholder="Any notes about today's work, delays, or site conditions…"></textarea>
    </div>

    <div class="ci-error" id="co-error"></div>

    <button class="btn-primary" id="btn-checkout">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
      Confirm Check-Out
    </button>
    <button class="btn-secondary" id="btn-wrong">That's not me</button>
  </div>
</div>

<!-- Success -->
<div id="screen-success" class="screen">
  <div class="success-screen">
    <div class="success-icon">✓</div>
    <div class="success-name" id="s-name"></div>
    <div class="success-sub" id="s-sub">You've been checked out. See you next time.</div>
    <div class="hours-badge">
      <div class="hb-label">Time on site</div>
      <div class="hb-value" id="s-hours">—</div>
      <div class="hb-unit">hours</div>
    </div>
    <button class="btn-secondary" id="btn-home" onclick="location.href='checkin.html'">
      Back to check-in
    </button>
  </div>
</div>

<script type="module">
  import { attendanceStore } from './js/toolkit/attendance-store.js';

  function updateClock() {
    const t = new Date().toLocaleTimeString('en-AU', { hour:'2-digit', minute:'2-digit' });
    const el = document.getElementById('live-time');
    const he = document.getElementById('co-header-time');
    if (el) el.textContent = t;
    if (he) he.textContent = new Date().toLocaleDateString('en-AU', { weekday:'short', day:'numeric', month:'long' });
  }
  updateClock();
  setInterval(updateClock, 5000);

  function show(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id)?.classList.add('active');
  }

  const params = new URLSearchParams(location.search);
  const attId  = params.get('id');

  let currentRecord = null;

  function populateCheckout(rec) {
    currentRecord = rec;
    document.getElementById('co-name').textContent    = rec.name;
    document.getElementById('co-company').textContent = rec.company || '';
    document.getElementById('co-trade').textContent   = rec.trade   || '';
    document.getElementById('co-project').textContent = rec.projectName || 'the site';
    document.getElementById('co-timein').textContent  = new Date(rec.timeIn).toLocaleTimeString('en-AU', { hour:'2-digit', minute:'2-digit' });
    show('screen-checkout');
  }

  if (attId) {
    const rec = attendanceStore.get(attId);
    if (!rec) { show('screen-lookup'); }
    else if (rec.timeOut) {
      // Already checked out — show success with existing data
      document.getElementById('s-name').textContent  = rec.name;
      document.getElementById('s-hours').textContent = rec.hoursOnSite != null ? rec.hoursOnSite.toFixed(2) : '—';
      show('screen-success');
    } else {
      populateCheckout(rec);
    }
  } else {
    show('screen-lookup');
  }

  // Manual lookup
  document.getElementById('btn-lookup').addEventListener('click', () => {
    const name    = document.getElementById('lookup-name').value.trim();
    const projHint = document.getElementById('lookup-project').value.trim().toLowerCase();
    const errEl   = document.getElementById('lookup-error');
    if (!name) { errEl.textContent = 'Please enter your name.'; errEl.style.display='block'; return; }

    const all = JSON.parse(localStorage.getItem('bik-attendance') || '[]');
    const matches = all.filter(r =>
      !r.timeOut &&
      r.name.toLowerCase() === name.toLowerCase() &&
      (!projHint || (r.projectName || '').toLowerCase().includes(projHint))
    );

    if (!matches.length) {
      errEl.textContent = 'No active check-in found for that name. Please check your spelling or ask the site supervisor.';
      errEl.style.display='block';
      return;
    }
    errEl.style.display='none';
    populateCheckout(matches[0]);
  });

  // Confirm check-out
  document.getElementById('btn-checkout').addEventListener('click', () => {
    if (!currentRecord) return;
    const notes = document.getElementById('co-notes').value.trim();
    const ok = attendanceStore.checkOut(currentRecord.id, { notes });
    if (!ok) {
      document.getElementById('co-error').textContent = 'Unable to record check-out. Please try again.';
      document.getElementById('co-error').style.display = 'block';
      return;
    }
    const updated = attendanceStore.get(currentRecord.id);
    document.getElementById('s-name').textContent  = updated.name;
    document.getElementById('s-hours').textContent = updated.hoursOnSite != null ? updated.hoursOnSite.toFixed(2) : '—';
    show('screen-success');
  });

  document.getElementById('btn-wrong').addEventListener('click', () => {
    currentRecord = null;
    show('screen-lookup');
  });
</script>

</body>
</html>
