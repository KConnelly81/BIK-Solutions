<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="BIK Business Toolkit — every tool to run a professional trade business. Quotes, SWMS, progress claims, site diary, attendance and more." />
  <meta name="robots" content="noindex" />
  <title>BIK Business Toolkit</title>
  <link rel="stylesheet" href="css/bik-design-system.css" />
<style>
/* ── Reset ── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;background:var(--bik-background);color:var(--bik-text);font-size:15px;line-height:1.5;-webkit-font-smoothing:antialiased;min-height:100vh}
button{font-family:inherit;cursor:pointer}
a{color:inherit;text-decoration:none}
svg{display:block}

/* ── App header ── */
.app-hdr{position:sticky;top:0;z-index:100;background:var(--bik-navy);display:flex;align-items:center;padding:0 20px;height:54px;gap:0;border-bottom:1px solid rgba(255,255,255,.06);flex-shrink:0}
.app-logo{display:flex;align-items:center;gap:9px;text-decoration:none;flex-shrink:0;margin-right:20px}
.logo-mark{width:30px;height:30px;background:var(--bik-orange);border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;color:#fff;letter-spacing:-.5px;flex-shrink:0}
.logo-name{font-size:13px;font-weight:600;color:#fff;letter-spacing:-.01em}
.app-nav{display:flex;align-items:center;gap:2px}
.nav-link{padding:6px 11px;border-radius:6px;font-size:13px;font-weight:500;color:rgba(255,255,255,.5);text-decoration:none;transition:color .15s,background .15s;white-space:nowrap}
.nav-link:hover{color:rgba(255,255,255,.85);background:rgba(255,255,255,.07)}
.nav-link.act{color:#fff;background:rgba(255,255,255,.11)}
.hdr-space{flex:1}
.hdr-action{display:flex;align-items:center;gap:6px;background:rgba(255,255,255,.09);border:1px solid rgba(255,255,255,.12);border-radius:7px;padding:6px 12px;font-size:12px;font-weight:600;color:rgba(255,255,255,.7);text-decoration:none;transition:background .15s,color .15s;white-space:nowrap}
.hdr-action:hover{background:rgba(255,255,255,.14);color:#fff}

/* ── Hero ── */
.hero{background:var(--bik-navy-dark, #14182A);padding:44px 20px 36px}
.hero-inner{max-width:600px;margin:0 auto;text-align:center}
.hero-eye{display:inline-block;font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--bik-orange);margin-bottom:14px}
.hero-h1{font-size:clamp(22px,5vw,34px);font-weight:800;color:#fff;letter-spacing:-.025em;line-height:1.15;margin-bottom:8px;text-wrap:balance}
.hero-sub{font-size:14px;color:rgba(255,255,255,.42);margin-bottom:28px}
.srch-wrap{position:relative}
.srch-ico{position:absolute;left:16px;top:50%;transform:translateY(-50%);color:rgba(255,255,255,.3);pointer-events:none}
.srch-input{width:100%;background:rgba(255,255,255,.09);border:1.5px solid rgba(255,255,255,.12);border-radius:12px;padding:14px 44px 14px 48px;font-size:15px;color:#fff;font-family:inherit;outline:none;transition:border-color .15s,background .15s}
.srch-input::placeholder{color:rgba(255,255,255,.32)}
.srch-input:focus{border-color:var(--bik-orange);background:rgba(255,255,255,.12)}
.srch-clear{position:absolute;right:14px;top:50%;transform:translateY(-50%);background:rgba(255,255,255,.15);border:none;border-radius:50%;width:22px;height:22px;color:#fff;font-size:11px;display:none;align-items:center;justify-content:center;line-height:1;cursor:pointer}
.srch-clear.on{display:flex}
.hints{display:flex;flex-wrap:wrap;justify-content:center;gap:6px;margin-top:14px}
.hint-chip{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);border-radius:20px;padding:5px 12px;font-size:12px;color:rgba(255,255,255,.5);cursor:pointer;transition:background .15s,color .15s;white-space:nowrap;font-family:inherit}
.hint-chip:hover{background:rgba(255,255,255,.12);color:rgba(255,255,255,.8)}

/* ── Recently used + drafts strip ── */
.recent-strip{background:var(--bik-surface);border-bottom:1px solid var(--bik-border);padding:11px 20px;display:flex;align-items:center;gap:10px;overflow-x:auto;scrollbar-width:none;min-height:46px}
.recent-strip::-webkit-scrollbar{display:none}
.recent-lbl{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--bik-text-muted);flex-shrink:0;white-space:nowrap}
.r-chip{display:flex;align-items:center;gap:7px;background:var(--bik-background);border:1px solid var(--bik-border-strong);border-radius:20px;padding:5px 13px 5px 8px;font-size:12px;font-weight:500;color:var(--bik-text);white-space:nowrap;cursor:pointer;transition:background .15s,transform .15s;flex-shrink:0;font-family:inherit}
.r-chip:hover{background:var(--bik-surface-raised, #FAFAF8);transform:translateY(-1px)}
.r-chip-icon{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0}
.draft-chip{border-style:dashed;border-color:var(--bik-warning)}
.draft-dot{width:7px;height:7px;border-radius:50%;background:var(--bik-warning);flex-shrink:0;margin-right:2px}

/* ── Search banner ── */
.srch-banner{display:none;padding:10px 20px;font-size:13px;color:var(--bik-text-muted);background:var(--bik-surface);border-bottom:1px solid var(--bik-border)}
.srch-banner.on{display:block}

/* ── Body ── */
.tk-body{max-width:960px;margin:0 auto;padding:24px 20px 80px;display:flex;flex-direction:column;gap:12px}
.no-res{display:none;text-align:center;padding:48px 20px;color:var(--bik-text-muted);font-size:14px}
.no-res.on{display:block}

/* ── Category block ── */
.cat-block{background:var(--bik-surface);border:1px solid var(--bik-border-strong);border-radius:14px;overflow:hidden;box-shadow:0 1px 2px rgba(0,0,0,.05)}
.cat-hdr{display:flex;align-items:center;gap:14px;padding:17px 20px;cursor:pointer;user-select:none;transition:background .15s;border-bottom:1px solid transparent;-webkit-tap-highlight-color:transparent}
.cat-hdr:hover{background:var(--bik-surface-raised, #FAFAF8)}
.cat-block.open .cat-hdr{border-bottom-color:var(--bik-border)}
.cat-ico{width:42px;height:42px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.cat-meta{flex:1;min-width:0}
.cat-name{font-size:11px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:var(--bik-text);margin-bottom:2px;line-height:1.2}
.cat-desc{font-size:13px;color:var(--bik-text-muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cat-pill{flex-shrink:0;font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px;letter-spacing:.02em;white-space:nowrap}
.cat-chev{flex-shrink:0;color:var(--bik-text-muted);transition:transform .2s}
.cat-block.open .cat-chev{transform:rotate(180deg)}
.cat-body{overflow:hidden;max-height:0;transition:max-height .38s cubic-bezier(.4,0,.2,1)}
.cat-block.open .cat-body{max-height:3200px}
.cat-body-inner{padding:12px 16px 16px}

/* ── Tool grid ── */
.tool-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
@media(max-width:680px){.tool-grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:420px){.tool-grid{grid-template-columns:1fr}}

/* ── Tool card ── */
.t-card{background:var(--bik-background);border:1.5px solid var(--bik-border-strong);border-radius:10px;padding:14px;cursor:pointer;transition:border-color .15s,background .15s,transform .15s,box-shadow .15s;display:flex;flex-direction:column;gap:7px;min-height:114px;position:relative;-webkit-tap-highlight-color:transparent;text-align:left;font-family:inherit;color:var(--bik-text)}
.t-card:hover{background:var(--bik-surface);border-color:var(--bik-border-strong);transform:translateY(-2px);box-shadow:0 4px 14px rgba(0,0,0,.09),0 2px 4px rgba(0,0,0,.05)}
.t-card.sel{background:var(--bik-surface);border-color:var(--cc);box-shadow:0 0 0 3px var(--cc-a)}
.t-card.ph{opacity:.42;cursor:not-allowed;pointer-events:none}
.t-card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px}
.t-ico{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
.t-status{font-size:10px;font-weight:700;padding:3px 8px;border-radius:20px;white-space:nowrap;letter-spacing:.02em;line-height:1.4}
.s-draft{background:#FEF3C7;color:#92400E}
.s-live{background:#DCFCE7;color:#166534}
.s-new{background:#DBEAFE;color:#1E3A8A}
.t-name{font-size:13px;font-weight:700;color:var(--bik-text);line-height:1.3;letter-spacing:-.01em}
.t-tag{font-size:12px;color:var(--bik-text-muted);line-height:1.45;flex:1}
.t-explore{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:700;color:var(--cc);letter-spacing:.02em;text-transform:uppercase;margin-top:auto;transition:gap .15s}
.t-card:hover .t-explore{gap:7px}

/* ── Detail panel ── */
.det-wrap{margin-top:10px}
.det-panel{background:var(--bik-surface);border:1.5px solid var(--bik-border-strong);border-radius:12px;overflow:hidden;animation:panelIn .22s ease forwards}
@keyframes panelIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.det-hdr{display:flex;align-items:center;gap:14px;padding:18px 20px 16px;border-bottom:1px solid var(--bik-border)}
.det-ico{width:46px;height:46px;border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0}
.det-title-grp{flex:1;min-width:0}
.det-title{font-size:17px;font-weight:800;letter-spacing:-.02em;color:var(--bik-text);margin-bottom:5px}
.det-tags{display:flex;gap:6px;flex-wrap:wrap}
.det-tag{font-size:10px;font-weight:700;padding:3px 9px;border-radius:20px;letter-spacing:.04em;text-transform:uppercase}
.det-close{background:var(--bik-background);border:1px solid var(--bik-border-strong);border-radius:8px;width:32px;height:32px;display:flex;align-items:center;justify-content:center;font-size:14px;color:var(--bik-text-muted);transition:background .15s,color .15s;flex-shrink:0;align-self:flex-start;font-family:inherit}
.det-close:hover{background:var(--bik-surface-raised, #f5f5f3);color:var(--bik-text)}
.det-body{display:grid;grid-template-columns:1fr 1fr}
@media(max-width:580px){.det-body{grid-template-columns:1fr}}
.det-left{padding:18px 20px;border-right:1px solid var(--bik-border)}
@media(max-width:580px){.det-left{border-right:none;border-bottom:1px solid var(--bik-border)}}
.det-right{padding:18px 20px}
.sec-lbl{font-size:9px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;color:var(--bik-text-muted);margin-bottom:8px}
.when-txt{font-size:14px;color:var(--bik-text);line-height:1.55}
.chk-list{list-style:none;display:flex;flex-direction:column;gap:8px;margin-top:10px}
.chk-list li{display:flex;align-items:flex-start;gap:8px;font-size:13px;color:var(--bik-text);line-height:1.4}
.chk-dot{width:16px;height:16px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px;font-size:9px;color:#fff}

/* ── Micro-previews ── */
.prev{background:var(--bik-background);border:1px solid var(--bik-border);border-radius:9px;padding:12px 14px;margin-top:14px;overflow-x:auto}
.prev-lbl{font-size:9px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;color:var(--bik-text-muted);margin-bottom:10px}
.vr-row{display:flex;justify-content:space-between;padding:5px 0;font-size:13px;border-bottom:1px solid var(--bik-border)}
.vr-row:last-child{border-bottom:none;font-weight:700}
.vr-lbl{color:var(--bik-text-muted)}
.vr-val{font-variant-numeric:tabular-nums;font-weight:600}
.vr-green{color:#16A34A}
.vr-arrow{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--bik-text-muted);padding:5px 0;font-variant-numeric:tabular-nums}
.vr-badge{display:inline-flex;align-items:center;background:#DCFCE7;color:#166534;font-size:11px;font-weight:700;padding:2px 8px;border-radius:20px}
.att-stat{display:flex;align-items:baseline;gap:6px;margin-bottom:10px}
.att-num{font-size:32px;font-weight:800;color:var(--bik-text);letter-spacing:-.04em;line-height:1}
.att-unit{font-size:12px;color:var(--bik-text-muted);text-transform:uppercase;letter-spacing:.06em}
.att-rows{display:flex;flex-direction:column;gap:5px}
.att-row{display:flex;align-items:center;justify-content:space-between;font-size:12px;color:var(--bik-text-muted)}
.att-dw{display:flex;align-items:center;gap:6px}
.att-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.diary-date{font-size:11px;font-weight:700;color:var(--bik-text-muted);letter-spacing:.04em;text-transform:uppercase;margin-bottom:8px}
.diary-flds{display:grid;grid-template-columns:1fr 1fr;gap:5px}
.diary-fld{background:var(--bik-surface);border:1px solid var(--bik-border);border-radius:6px;padding:7px 9px;font-size:11px;color:var(--bik-text-muted);display:flex;align-items:center;gap:5px}
.diary-fld.fill{color:var(--bik-text);font-weight:500}
.claim-rows{display:flex;flex-direction:column}
.cl-row{display:flex;justify-content:space-between;font-size:12px;padding:5px 0;border-bottom:1px solid var(--bik-border)}
.cl-row:last-child{border-bottom:none;padding-top:8px;font-weight:700;font-size:13px}
.cl-lbl{color:var(--bik-text-muted)}
.cl-val{font-variant-numeric:tabular-nums}
.cl-green{color:#16A34A;font-weight:600}
.cl-prog{height:5px;background:var(--bik-border-strong);border-radius:10px;margin-top:10px;overflow:hidden}
.cl-fill{height:100%;border-radius:10px;background:#2563EB;width:65%}
.tb-topic{font-size:13px;font-weight:700;color:var(--bik-text);margin-bottom:4px}
.tb-meta{font-size:11px;color:var(--bik-text-muted);margin-bottom:10px}
.tb-pts{list-style:none;display:flex;flex-direction:column;gap:4px}
.tb-pt{display:flex;align-items:flex-start;gap:6px;font-size:12px;color:var(--bik-text-muted)}
.tb-bul{width:5px;height:5px;border-radius:50%;background:#D97706;margin-top:5px;flex-shrink:0}
.qt-rows{display:flex;flex-direction:column}
.qt-row{display:flex;justify-content:space-between;font-size:12px;padding:5px 0;border-bottom:1px solid var(--bik-border)}
.qt-row:last-child{border-bottom:none;padding-top:8px;font-weight:700;font-size:13px}
.qt-lbl{color:var(--bik-text-muted);display:flex;align-items:center;gap:5px}
.qt-val{font-variant-numeric:tabular-nums}
.qt-total{color:var(--bik-orange);font-weight:700}
.swms-rows{display:flex;flex-direction:column;gap:5px}
.swms-row{display:grid;grid-template-columns:1fr 1fr;gap:6px;font-size:11px;padding:5px 0;border-bottom:1px solid var(--bik-border)}
.swms-row:last-child{border-bottom:none}
.swms-haz{color:var(--bik-text-muted);display:flex;align-items:center;gap:4px}
.swms-ctl{color:var(--bik-text);font-weight:500}
.swms-head{font-size:9px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:var(--bik-text-muted);display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:4px}

/* ── Panel footer ── */
.det-foot{padding:14px 20px;border-top:1px solid var(--bik-border);display:flex;align-items:center;gap:10px;background:var(--bik-surface-raised, #FAFAF8);flex-wrap:wrap}
.btn-p{display:inline-flex;align-items:center;gap:6px;background:var(--cc);color:#fff;font-size:14px;font-weight:700;padding:10px 20px;border-radius:9px;border:none;text-decoration:none;transition:filter .15s,transform .15s;font-family:inherit;letter-spacing:-.01em;cursor:pointer}
.btn-p:hover{filter:brightness(.88);transform:translateY(-1px)}
.btn-g{display:inline-flex;align-items:center;gap:6px;background:transparent;color:var(--bik-text-muted);font-size:13px;font-weight:600;padding:10px 16px;border-radius:9px;border:1.5px solid var(--bik-border-strong);text-decoration:none;transition:background .15s,color .15s;font-family:inherit;cursor:pointer}
.btn-g:hover{background:var(--bik-background);color:var(--bik-text)}

/* ── Coming soon chips ── */
.coming-wrap{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
.coming-chip{display:flex;align-items:center;gap:5px;background:var(--bik-surface-raised, #f5f5f3);border:1px dashed var(--bik-border-strong);border-radius:7px;padding:6px 11px;font-size:11px;color:var(--bik-text-muted);opacity:.7}

/* ── Document history section ── */
.history-section{max-width:960px;margin:0 auto;padding:0 20px 32px}
.history-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.history-title{font-size:11px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:var(--bik-text-muted)}
.history-list{display:flex;flex-direction:column;gap:6px}
.history-item{display:flex;align-items:center;gap:12px;background:var(--bik-surface);border:1px solid var(--bik-border-strong);border-radius:9px;padding:11px 14px;transition:background .15s}
.history-item:hover{background:var(--bik-surface-raised, #f9f9f8)}
.history-item-ico{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.history-item-body{flex:1;min-width:0}
.history-item-title{font-size:13px;font-weight:600;color:var(--bik-text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.history-item-meta{font-size:11px;color:var(--bik-text-muted);margin-top:2px}
.history-item-action{flex-shrink:0;display:inline-flex;align-items:center;gap:5px;font-size:12px;font-weight:600;color:var(--bik-orange);padding:5px 10px;border-radius:6px;border:1.5px solid rgba(216,90,48,.2);transition:background .15s}
.history-item-action:hover{background:rgba(216,90,48,.06)}

/* ── How it works modal ── */
.modal-ov{position:fixed;inset:0;background:rgba(14,16,22,.65);z-index:200;display:flex;align-items:flex-end;justify-content:center;padding:0;opacity:0;pointer-events:none;transition:opacity .25s ease;backdrop-filter:blur(4px)}
.modal-ov.on{opacity:1;pointer-events:all}
@media(min-width:540px){.modal-ov{align-items:center;padding:20px}}
.modal-box{background:var(--bik-surface);border-radius:20px 20px 0 0;width:100%;max-height:90vh;overflow-y:auto;transform:translateY(20px);transition:transform .25s ease}
@media(min-width:540px){.modal-box{border-radius:16px;max-width:500px;transform:scale(.95) translateY(8px)}}
.modal-ov.on .modal-box{transform:none}
.modal-hdr{display:flex;justify-content:space-between;align-items:flex-start;padding:22px 22px 0}
.modal-title{font-size:17px;font-weight:800;letter-spacing:-.02em;color:var(--bik-text)}
.modal-sub{font-size:13px;color:var(--bik-text-muted);margin-top:3px}
.modal-x{background:var(--bik-background);border:1px solid var(--bik-border-strong);border-radius:8px;width:32px;height:32px;display:flex;align-items:center;justify-content:center;font-size:14px;color:var(--bik-text-muted);font-family:inherit;flex-shrink:0;cursor:pointer;transition:background .15s}
.modal-x:hover{background:var(--bik-surface-raised, #f5f3f0)}
.modal-steps{padding:16px 22px 24px}
.how-step{display:flex;gap:16px;padding:14px 0;position:relative}
.how-step:not(:last-child)::after{content:'';position:absolute;left:19px;top:48px;height:calc(100% - 34px);width:2px;background:var(--bik-border-strong)}
.step-n{width:38px;height:38px;border-radius:50%;border:2px solid var(--bik-border-strong);background:var(--bik-surface-raised, #f9f9f8);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;color:var(--bik-text-muted);flex-shrink:0;z-index:1}
.step-b{padding-top:5px}
.step-t{font-size:14px;font-weight:700;color:var(--bik-text);margin-bottom:3px}
.step-d{font-size:13px;color:var(--bik-text-muted);line-height:1.5}

/* ── Responsive ── */
@media(max-width:600px){
  .app-nav{display:none}
  .hero{padding:32px 16px 28px}
  .tk-body{padding:16px 12px 60px;gap:10px}
  .cat-hdr{padding:14px 16px}
  .cat-body-inner{padding:10px 10px 12px}
  .det-hdr,.det-left,.det-right,.det-foot{padding:14px 16px}
}
@media(prefers-reduced-motion:reduce){
  *,*::before,*::after{transition:none!important;animation:none!important}
}
</style>
</head>
<body>

<!-- ====== APP HEADER ====== -->

const PREVS = {
  variation: prevVariation,
  claim: prevClaim,
  attendance: prevAttendance,
  diary: prevDiary,
  toolbox: prevToolbox,
  quote: prevQuote,
  swms: prevSWMS

/* ── State ── */
let selTool = null;
let selCat = null;

/* ── Recently used (localStorage-backed) ── */
const RECENT_KEY = 'bik-recently-used';

function getRecent() {
  try {
    const raw = localStorage.getItem(RECENT_KEY);
    return raw ? JSON.parse(raw) : [];
  } catch { return []; }
}

function recordOpen(toolId) {
  try {
    const recent = getRecent().filter(r => r.id !== toolId);
    recent.unshift({ id: toolId, ts: Date.now() });
    localStorage.setItem(RECENT_KEY, JSON.stringify(recent.slice(0, 6)));
  } catch {}
}

function hasDraft(toolId) {
  const key = DRAFT_KEYS[toolId];
  if (!key) return false;
  try {
    const raw = localStorage.getItem(key);
    if (!raw) return false;
    const data = JSON.parse(raw);
    return data && typeof data === 'object' && Object.keys(data).length > 0;
  } catch { return false; }
}

/* ── Card HTML ── */
function cardHTML(id, cat) {
  const t = TOOLS[id];
  if (!t) return '';
  const bg = hex(cat.color, 0.1);
  const draft = hasDraft(id);
  const statusHtml = draft
    ? `<span class="t-status s-draft" title="You have a saved draft">Draft saved</span>`
    : '';
  return `<button class="t-card" data-tool="${id}" data-cat="${cat.id}"
    style="--cc:${cat.color};--cc-a:${hex(cat.color, 0.15)}"
    aria-expanded="false" aria-label="Explore ${t.name}" type="button">
    <div class="t-card-top">
      <div class="t-ico" style="background:${bg}">${t.icon}</div>
      ${statusHtml}
    </div>
    <div class="t-name">${t.name}</div>
    <div class="t-tag">${t.tag}</div>
    <div class="t-explore">Explore <span aria-hidden="true">→</span></div>
  </button>`;
}

/* ── Detail panel HTML ── */
function detailHTML(id, cat) {
  const t = TOOLS[id];
  if (!t) return '';
  const bg = hex(cat.color, 0.1);
  const prev = t.prev && PREVS[t.prev] ? PREVS[t.prev]() : '';
  const hiw = t.hiw
    ? `<button class="btn-g" data-how="${id}" type="button">See how it works →</button>`
    : '';
  const draft = hasDraft(id);
  const draftNote = draft
    ? `<span style="font-size:12px;color:#92400E;background:#FEF3C7;padding:5px 10px;border-radius:6px;font-weight:600">📝 You have a saved draft</span>`
    : '';
  return `<div class="det-panel" id="dp-${id}" style="--cc:${cat.color}">
    <div class="det-hdr">
      <div class="det-ico" style="background:${bg}">${t.icon}</div>
      <div class="det-title-grp">
        <div class="det-title">${t.name}</div>
        <div class="det-tags">
          <span class="det-tag" style="background:${bg};color:${cat.color}">${cat.name.split(' ').slice(0, 3).join(' ')}</span>
        </div>
      </div>
      <button class="det-close" data-close type="button" aria-label="Close detail">✕</button>
    </div>
    <div class="det-body">
      <div class="det-left">
        <div class="sec-lbl">When to use it</div>
        <p class="when-txt">${t.when}</p>
        ${prev}
      </div>
      <div class="det-right">
        <div class="sec-lbl">What BIK does</div>
        <ul class="chk-list">
          ${t.what.map(w => `<li><span class="chk-dot" style="background:${cat.color}">✓</span><span>${w}</span></li>`).join('')}
        </ul>
      </div>
    </div>
    <div class="det-foot">
      <a class="btn-p" href="${t.href}" style="--cc:${cat.color}"
        onclick="recordOpen('${id}')">Open ${t.name} →</a>
      ${hiw}
      ${draftNote}
    </div>
  </div>`;
}

/* ── Category HTML ── */
function catHTML(cat) {
  const total = cat.tools.length + cat.coming.length;
  const bg = hex(cat.color, 0.1);
  const cards = cat.tools.map(id => cardHTML(id, cat)).join('');
  const coming = cat.coming.map(c =>
    `<span class="coming-chip">${c.i} ${c.n}</span>`
  ).join('');
  return `<div class="cat-block${cat.open ? ' open' : ''}" id="c-${cat.id}" data-cat="${cat.id}">
    <div class="cat-hdr" role="button" tabindex="0"
      aria-expanded="${cat.open}" aria-controls="cb-${cat.id}">
      <div class="cat-ico" style="background:${bg}">${cat.icon}</div>
      <div class="cat-meta">
        <div class="cat-name">${cat.name}</div>
        <div class="cat-desc">${cat.desc}</div>
      </div>
      <span class="cat-pill" style="background:${bg};color:${cat.color}">${total} tools</span>
      <svg class="cat-chev" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true"><polyline points="6 9 12 15 18 9"/></svg>
    </div>
    <div class="cat-body" id="cb-${cat.id}">
      <div class="cat-body-inner">
        <div class="tool-grid" data-catg="${cat.id}">${cards}</div>
        <div id="dw-${cat.id}"></div>
        ${coming ? `<div class="coming-wrap">${coming}</div>` : ''}
      </div>
    </div>
  </div>`;
}

/* ── Render recently used + draft chips ── */
function renderRecent() {
  const el = document.getElementById('js-recent');
  if (!el) return;

  const recent = getRecent();

  /* Collect tools with drafts that aren't in recently used */
  const recentIds = recent.map(r => r.id);
  const draftIds = Object.keys(DRAFT_KEYS).filter(id => hasDraft(id) && !recentIds.includes(id));

  if (recent.length === 0 && draftIds.length === 0) {
    el.style.display = 'none';
    return;
  }

  const lbl = document.createElement('span');
  lbl.className = 'recent-lbl';
  lbl.textContent = 'Recently used';
  el.appendChild(lbl);

  recent.forEach(r => {
    const t = TOOLS[r.id];
    if (!t) return;
    const cat = CATS.find(c => c.id === t.cat);
    const color = cat ? cat.color : '#888';
    const b = document.createElement('button');
    b.className = 'r-chip' + (hasDraft(r.id) ? ' draft-chip' : '');
    b.type = 'button';
    b.dataset.tool = r.id;
    b.innerHTML = `${hasDraft(r.id) ? '<span class="draft-dot"></span>' : ''}<span class="r-chip-icon" style="background:${hex(color, 0.12)}">${t.icon}</span>${t.name}`;
    b.addEventListener('click', () => openInCat(r.id));
    el.appendChild(b);
  });

  if (draftIds.length > 0) {
    const dlbl = document.createElement('span');
    dlbl.className = 'recent-lbl';
    dlbl.style.marginLeft = '8px';
    dlbl.textContent = 'Saved drafts';
    el.appendChild(dlbl);

    draftIds.forEach(id => {
      const t = TOOLS[id];
      if (!t) return;
      const cat = CATS.find(c => c.id === t.cat);
      const color = cat ? cat.color : '#888';
      const b = document.createElement('button');
      b.className = 'r-chip draft-chip';
      b.type = 'button';
      b.dataset.tool = id;
      b.innerHTML = `<span class="draft-dot"></span><span class="r-chip-icon" style="background:${hex(color, 0.12)}">${t.icon}</span>${t.name}`;
      b.addEventListener('click', () => openInCat(id));
      el.appendChild(b);
    });
  }
}

/* ── Render search hints ── */
function renderHints() {
  const el = document.getElementById('js-hints');
  if (!el) return;
  HINTS.forEach(h => {
    const b = document.createElement('button');
    b.className = 'hint-chip';
    b.type = 'button';
    b.textContent = h.t;
    b.addEventListener('click', () => {
      const s = document.getElementById('js-srch');
      if (s) { s.value = h.q; s.dispatchEvent(new Event('input')); }
    });
    el.appendChild(b);
  });
}

/* ── Accordion ── */
function toggleCat(id) {
  const bl = document.getElementById('c-' + id);
  if (!bl) return;
  const open = bl.classList.toggle('open');
  bl.querySelector('.cat-hdr').setAttribute('aria-expanded', open);
  if (!open && selCat === id) closeDetail();
}

/* ── Detail open/close ── */
function openDetail(toolId, catId, card) {
  closeDetail(false);
  selTool = toolId;
  selCat = catId;
  const bl = document.getElementById('c-' + catId);
  if (bl && !bl.classList.contains('open')) {
    bl.classList.add('open');
    bl.querySelector('.cat-hdr').setAttribute('aria-expanded', 'true');
  }
  document.querySelectorAll('.t-card').forEach(c => {
    c.classList.remove('sel');
    c.setAttribute('aria-expanded', 'false');
  });
  if (card) {
    card.classList.add('sel');
    card.setAttribute('aria-expanded', 'true');
  }
  const cat = CATS.find(c => c.id === catId);
  const dw = document.getElementById('dw-' + catId);
  if (dw && cat) {
    dw.innerHTML = detailHTML(toolId, cat);
    setTimeout(() => {
      const dp = document.getElementById('dp-' + toolId);
      if (dp) dp.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }, 50);
  }
}

function closeDetail(reset = true) {
  document.querySelectorAll('.t-card').forEach(c => {
    c.classList.remove('sel');
    c.setAttribute('aria-expanded', 'false');
  });
  document.querySelectorAll('[id^="dw-"]').forEach(w => { w.innerHTML = ''; });
  if (reset) { selTool = null; selCat = null; }
}

function openInCat(toolId) {
  const t = TOOLS[toolId];
  if (!t) return;
  const card = document.querySelector(`.t-card[data-tool="${toolId}"]`);
  openDetail(toolId, t.cat, card);
}

/* ── How it works modal ── */
function openHIW(toolId) {
  const t = TOOLS[toolId];
  if (!t || !t.hiw) return;
  document.getElementById('js-modal-title').textContent = `How ${t.name} works`;
  document.getElementById('js-modal-sub').textContent = 'A quick overview in 4 steps';
  document.getElementById('js-modal-steps').innerHTML = t.hiw.map((s, i) =>
    `<div class="how-step">
      <div class="step-n">${i + 1}</div>
      <div class="step-b">
        <div class="step-t">${s.t}</div>
        <div class="step-d">${s.d}</div>
      </div>
    </div>`
  ).join('');
  document.getElementById('js-modal').classList.add('on');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('js-modal').classList.remove('on');
  document.body.style.overflow = '';
}

/* ── Search ── */
let srchQ = '';
function applySearch() {
  const q = srchQ.toLowerCase();
  const banner = document.getElementById('js-banner');
  const nores = document.getElementById('js-nores');
  if (!q) {
    document.querySelectorAll('.t-card').forEach(c => { c.style.display = ''; });
    document.querySelectorAll('.cat-block').forEach(b => { b.style.display = ''; });
    banner.classList.remove('on');
    nores.classList.remove('on');
    return;
  }
  const matches = Object.entries(TOOLS).filter(([id, t]) => {
    return [t.name, t.tag, t.when, ...t.kw].join(' ').toLowerCase().includes(q);
  }).map(([id]) => id);
  document.querySelectorAll('.t-card').forEach(c => {
    c.style.display = matches.includes(c.dataset.tool) ? '' : 'none';
  });
  let total = 0;
  document.querySelectorAll('.cat-block').forEach(bl => {
    const cat = CATS.find(c => c.id === bl.dataset.cat);
    const has = cat && cat.tools.some(id => matches.includes(id));
    bl.style.display = has ? '' : 'none';
    if (has) {
      total += cat.tools.filter(id => matches.includes(id)).length;
      if (!bl.classList.contains('open')) bl.classList.add('open');
    }
  });
  banner.classList.add('on');
  banner.innerHTML = total > 0
    ? `<strong>${total} tool${total !== 1 ? 's' : ''}</strong> match "${srchQ}"`
    : '';
  nores.classList.toggle('on', total === 0);
}

/* ── Document history ── */
function renderHistory() {
  const HISTORY_KEY = 'bik-doc-history';
  let records = [];
  try {
    const raw = localStorage.getItem(HISTORY_KEY);
    records = raw ? JSON.parse(raw) : [];
  } catch {}
  if (!records.length) return;

  /* Map toolId from document history to our TOOLS keys */
  const TOOL_ID_MAP = {
    'variation-notice': 'variation',
    'quote-builder': 'quote-builder',
    'progress-claim': 'progress-claim',
    'payment-reminder': 'payment-reminder',
    'site-diary': 'site-diary',
    'swms': 'swms',
    'toolbox-talk': 'toolbox-talk',
    'incident-report': 'incident-report',
    'inspection-checklist': 'inspection-checklist',
    'eot-claim': 'eot-claim',
    'delay-notice': 'delay-notice',
    'instruction-to-proceed': 'instruction-to-proceed',
    'defect-report': 'defect-report',
    'non-conformance-report': 'non-conformance',
    'subcontractor-agreement': 'subcontractor-agreement',
    'notice-to-show-cause': 'notice-to-show-cause',
    'contract-termination': 'contract-termination',
    'scope-of-works': 'scope-of-works',
    'practical-completion': 'practical-completion',
    'handover-checklist': 'handover-checklist'
  };

  const section = document.getElementById('js-history-section');
  const list = document.getElementById('js-history-list');
  if (!section || !list) return;

  const recent10 = records.slice(0, 10);
  recent10.forEach(rec => {
    const toolKey = TOOL_ID_MAP[rec.toolId] || rec.toolId;
    const t = TOOLS[toolKey];
    const cat = t ? CATS.find(c => c.id === t.cat) : null;
    const color = cat ? cat.color : '#888';
    const icon = t ? t.icon : '📄';
    const href = t ? t.href : '#';
    const date = rec.updatedAt
      ? new Date(rec.updatedAt).toLocaleDateString('en-AU', { day: 'numeric', month: 'short', year: 'numeric' })
      : '';

    const item = document.createElement('div');
    item.className = 'history-item';
    item.innerHTML = `
      <div class="history-item-ico" style="background:${hex(color, 0.1)}">${icon}</div>
      <div class="history-item-body">
        <div class="history-item-title">${rec.title || rec.reference || 'Untitled document'}</div>
        <div class="history-item-meta">${rec.reference ? rec.reference + ' · ' : ''}${date}</div>
      </div>
      <a href="${href}" class="history-item-action">Open →</a>
    `;
    list.appendChild(item);
  });

  section.hidden = false;
}

/* ── Init ── */
function init() {
  const tk = document.getElementById('js-tk');
  if (!tk) return;
  tk.innerHTML = CATS.map(catHTML).join('');
  renderRecent();
  renderHints();
  renderHistory();

  /* Category accordions */
  document.querySelectorAll('.cat-hdr').forEach(h => {
    h.addEventListener('click', () => toggleCat(h.closest('.cat-block').dataset.cat));
    h.addEventListener('keydown', e => {
      if (e.key === 'Enter' || e.key === ' ') {
        e.preventDefault();
        toggleCat(h.closest('.cat-block').dataset.cat);
      }
    });
  });

  /* Delegated clicks */
  document.addEventListener('click', e => {
    const card = e.target.closest('.t-card:not(.ph)');
    if (card) {
      const id = card.dataset.tool;
      const cat = card.dataset.cat;
      id === selTool ? closeDetail() : openDetail(id, cat, card);
      return;
    }
    if (e.target.closest('[data-close]')) { closeDetail(); return; }
    if (e.target.closest('[data-how]')) {
      openHIW(e.target.closest('[data-how]').dataset.how);
      return;
    }
    if (e.target === document.getElementById('js-modal') || e.target.closest('#js-modal-x')) {
      closeModal();
    }
  });

  /* Search */
  const si = document.getElementById('js-srch');
  const sc = document.getElementById('js-srch-clear');
  if (si) {
    si.addEventListener('input', () => {
      srchQ = si.value.trim();
      sc.classList.toggle('on', !!srchQ);
      applySearch();
    });
  }
  if (sc) {
    sc.addEventListener('click', () => {
      si.value = '';
      srchQ = '';
      sc.classList.remove('on');
      si.focus();
      applySearch();
    });
  }

  /* Keyboard */
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') { closeDetail(); closeModal(); }
  });
}

document.readyState === 'loading'
  ? document.addEventListener('DOMContentLoaded', init)
  : init();
</script>
